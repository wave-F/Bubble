<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>染色关卡编辑器</title>
    <style>
      :root {
        --bg: #f4f8fc;
        --panel: #ffffff;
        --text: #1f2d3d;
        --muted: #5a6b7d;
        --line: rgba(88, 112, 136, 0.22);
        --accent: #2f8cff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 20px 16px 40px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
      }

      .sub {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 16px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 8px 24px rgba(45, 70, 94, 0.08);
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      .field label {
        font-size: 12px;
        color: var(--muted);
      }

      .field input,
      .field select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 14px;
      }

      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .palette {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .swatch {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 2px solid #fff;
        box-shadow: 0 0 0 1px rgba(66, 83, 100, 0.25);
        cursor: pointer;
      }

      .swatch.active {
        box-shadow: 0 0 0 2px var(--accent), 0 0 0 4px rgba(47, 140, 255, 0.25);
        transform: scale(1.06);
      }

      .grid-wrap {
        display: flex;
        justify-content: center;
        padding: 12px 0 4px;
      }

      .grid {
        display: grid;
        gap: 8px;
        padding: 14px;
        border-radius: 16px;
        background: linear-gradient(180deg, #eef5fc, #e3edf7);
        border: 1px solid var(--line);
      }

      .cell {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.9);
        box-shadow: inset 0 -4px 10px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(35, 60, 90, 0.12);
        cursor: pointer;
        transition: transform 100ms ease;
      }

      .cell:hover { transform: scale(1.04); }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      button {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      button.save-ok {
        background: #1f9d55;
        border-color: #1f9d55;
        color: #fff;
      }

      button.save-fail {
        background: #d64545;
        border-color: #d64545;
        color: #fff;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .stats {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
        margin-top: 8px;
        white-space: pre-line;
      }

      textarea {
        width: 100%;
        min-height: 280px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .level-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .level-tabs button.active {
        background: #e8f3ff;
        border-color: #9ec7ff;
        color: #1d5fbf;
      }

      body.playtest-open { overflow: hidden; }

      .playtest-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .playtest-overlay.hidden {
        display: none;
      }

      .playtest-backdrop {
        position: absolute;
        inset: 0;
        border: 0;
        background: rgba(18, 32, 48, 0.45);
        cursor: pointer;
      }

      .playtest-dialog {
        position: relative;
        width: min(520px, 100%);
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 18px 48px rgba(24, 44, 68, 0.22);
      }

      .playtest-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .playtest-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .playtest-close {
        width: 32px;
        height: 32px;
        padding: 0;
        border-radius: 50%;
        font-size: 18px;
        line-height: 1;
      }

      .playtest-status {
        margin: 0 0 10px;
        font-size: 13px;
        color: var(--muted);
        min-height: 1.4em;
      }

      .playtest-status[data-state="win"] { color: #1f9d55; }
      .playtest-status[data-state="lose"] { color: #d64545; }

      .playtest-steps {
        margin: 0 0 12px;
        font-size: 14px;
        font-weight: 600;
      }

      .playtest-grid-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 12px;
      }

      .playtest-grid {
        display: grid;
        gap: 8px;
        padding: 14px;
        border-radius: 16px;
        background: linear-gradient(180deg, #eef5fc, #e3edf7);
        border: 1px solid var(--line);
      }

      .playtest-cell {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.9);
        box-shadow: inset 0 -4px 10px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(35, 60, 90, 0.12);
        cursor: pointer;
        transition: transform 100ms ease;
      }

      .playtest-cell:hover:not(:disabled) { transform: scale(1.05); }

      .playtest-cell.empty {
        background: transparent;
        border: 2px dashed rgba(88, 112, 136, 0.28);
        box-shadow: none;
        cursor: default;
        opacity: 0.55;
      }

      .playtest-cell.preview-target {
        box-shadow:
          0 0 0 3px #fff,
          0 0 0 5px #2f8cff,
          inset 0 -4px 10px rgba(0, 0, 0, 0.08),
          0 4px 10px rgba(35, 60, 90, 0.12);
        transform: scale(1.06);
      }

      .playtest-cell {
        position: relative;
      }

      .playtest-step-badge {
        position: absolute;
        right: -2px;
        top: -2px;
        min-width: 18px;
        height: 18px;
        padding: 0 4px;
        border-radius: 999px;
        background: #2f8cff;
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        line-height: 18px;
        text-align: center;
        box-shadow: 0 2px 6px rgba(35, 60, 90, 0.25);
        pointer-events: none;
      }

      .playtest-optimal {
        margin: 0 0 8px;
        font-size: 13px;
        color: #1d5fbf;
        font-weight: 600;
      }

      .playtest-preview-actions {
        margin-bottom: 10px;
      }

      @media (max-width: 860px) {
        .layout { grid-template-columns: 1fr; }
        .cell { width: 48px; height: 48px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>染色关卡编辑器</h1>
      <p class="sub">点击格子涂抹颜色，导出带 <code>cells</code> 的固定布局。游戏会优先使用 <code>cells</code>，不再依赖 seed 洗牌。</p>

      <div class="layout">
        <section class="panel">
          <h2>关卡参数</h2>
          <div class="level-tabs" id="level-tabs"></div>
          <div class="field">
            <label for="level-name">名称</label>
            <input id="level-name" type="text" value="染色-01" />
          </div>
          <div class="row-2">
            <div class="field">
              <label for="level-id">ID</label>
              <input id="level-id" type="number" min="1" value="1" />
            </div>
            <div class="field">
              <label for="step-limit">步数上限</label>
              <input id="step-limit" type="number" min="1" value="7" />
            </div>
          </div>
          <div class="row-2">
            <div class="field">
              <label for="grid-size">棋盘</label>
              <select id="grid-size">
                <option value="3" selected>3 × 3</option>
                <option value="4">4 × 4</option>
                <option value="5">5 × 5</option>
              </select>
            </div>
            <div class="field">
              <label for="difficulty">难度</label>
              <select id="difficulty">
                <option value="easy" selected>easy</option>
                <option value="medium">medium</option>
                <option value="hard">hard</option>
              </select>
            </div>
          </div>

          <h2>画笔</h2>
          <div class="palette" id="palette"></div>

          <div class="actions">
            <button id="btn-fill-seed" type="button">用 seed 填充</button>
            <button id="btn-clear" type="button">清空</button>
            <button id="btn-load-file" type="button">导入 JSON</button>
          </div>
          <input id="file-input" type="file" accept="application/json,.json" hidden />

          <div class="stats" id="stats"></div>
        </section>

        <section class="panel">
          <h2>棋盘</h2>
          <div class="grid-wrap">
            <div class="grid" id="grid"></div>
          </div>
          <div class="actions">
            <button id="btn-playtest" class="primary" type="button">试玩本关</button>
            <button id="btn-solve" type="button">计算最优步数</button>
          </div>

          <h2>导出</h2>
          <div class="actions">
            <button id="btn-save" class="primary" type="button">保存到关卡文件</button>
            <button id="btn-export" type="button">更新 JSON 预览</button>
            <button id="btn-copy" type="button">复制当前关卡</button>
            <button id="btn-download" type="button">下载 levels.json</button>
          </div>
          <textarea id="export-json" readonly placeholder="点击「更新 JSON 预览」"></textarea>
        </section>
      </div>
    </div>

    <div id="playtest-overlay" class="playtest-overlay hidden" aria-hidden="true">
      <button id="playtest-backdrop" class="playtest-backdrop" type="button" aria-label="关闭试玩"></button>
      <div class="playtest-dialog" role="dialog" aria-modal="true" aria-label="关卡试玩">
        <div class="playtest-head">
          <h2 id="playtest-title">试玩</h2>
          <button id="playtest-close" class="playtest-close" type="button" aria-label="关闭">×</button>
        </div>
        <p id="playtest-status" class="playtest-status" data-state="playing">点击泡泡捏碎：自己消失，四邻染成源色</p>
        <p id="playtest-optimal" class="playtest-optimal">最优步数：—</p>
        <p id="playtest-steps" class="playtest-steps">剩余步数：0 / 0</p>
        <div class="playtest-grid-wrap">
          <div id="playtest-grid" class="playtest-grid"></div>
        </div>
        <div class="actions playtest-preview-actions">
          <button id="playtest-preview" type="button">解法预览</button>
          <button id="playtest-preview-play" type="button">自动播放</button>
          <button id="playtest-preview-step" type="button">下一步</button>
          <button id="playtest-preview-stop" type="button">停止预览</button>
        </div>
        <div class="actions">
          <button id="playtest-restart" type="button">重来</button>
          <button id="playtest-close-footer" type="button">关闭</button>
        </div>
      </div>
    </div>

    <script type="module" src="./src/level-editor.js"></script>
  </body>
</html>
